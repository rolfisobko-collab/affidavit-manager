services:
  - type: web
    name: affidavit-manager
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: affidavit-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: affidavit-db
    plan: free
    databaseName: affidavit
    user: affidavit_user
